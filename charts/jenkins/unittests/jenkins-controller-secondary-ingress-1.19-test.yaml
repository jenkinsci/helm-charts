suite: Controller Secondary Ingress
release:
  name: my-release
  namespace: my-namespace
templates:
  - jenkins-controller-secondary-ingress.yaml
capabilities:
  majorVersion: 1
  minorVersion: 19
tests:
  - it: test defaults
    asserts:
      - hasDocuments:
          count: 0
  - it: enabled
    set:
      controller.secondaryingress:
        enabled: true
        hostName: jenkins.example.com
        ingressClassName: nginx
        paths:
          - /github-webhook
        tls:
          - secretName: tlsSecret
            hosts:
              - jenkins.example.com
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: apiVersion
          value: networking.k8s.io/v1
      - equal:
          path: metadata.name
          value: my-release-jenkins-secondary
      - equal:
          path: metadata.namespace
          value: my-namespace
      - matchRegex:
          path: metadata.labels["helm.sh/chart"]
          pattern: ^jenkins-
      - isNull:
          path: metadata.annotations
      - equal:
          path: spec
          value:
            ingressClassName: nginx
            rules:
              - host: jenkins.example.com
                http:
                  paths:
                    - backend:
                        service:
                          name: my-release-jenkins
                          port:
                            number: 8080
                      path: /github-webhook
                      pathType: ImplementationSpecific
            tls:
              - hosts:
                  - jenkins.example.com
                secretName: tlsSecret
  - it: disable helm.sh label
    set:
      renderHelmLabels: false
      controller.secondaryingress:
        enabled: true
        hostName: jenkins.example.com
        paths:
          - /github-webhook
    asserts:
      - equal:
          path: metadata.labels
          value:
            app.kubernetes.io/component: jenkins-controller
            app.kubernetes.io/instance: my-release
            app.kubernetes.io/managed-by: Helm
            app.kubernetes.io/name: jenkins
  - it: hostName with Release.Name template variable
    set:
      controller.secondaryingress:
        enabled: true
        hostName: jenkins-{{ .Release.Name }}.example.com
        ingressClassName: nginx
        paths:
          - /wsagents/
        tls:
          - secretName: my-tls-secret
            hosts:
              - jenkins-{{ .Release.Name }}.example.com
    asserts:
      - equal:
          path: spec.rules[0].host
          value: jenkins-my-release.example.com
      - equal:
          path: spec.tls[0].hosts[0]
          value: jenkins-my-release.example.com
      - equal:
          path: spec.tls[0].secretName
          value: my-tls-secret
  - it: multiple TLS hosts with Release.Name template variable
    set:
      controller.secondaryingress:
        enabled: true
        hostName: jenkins-{{ .Release.Name }}.example.com
        ingressClassName: nginx
        paths:
          - /wsagents/
        tls:
          - secretName: my-tls-secret
            hosts:
              - jenkins-{{ .Release.Name }}.example.com
              - jenkins-{{ .Release.Name }}.alt.example.com
    asserts:
      - equal:
          path: spec.tls[0].hosts[0]
          value: jenkins-my-release.example.com
      - equal:
          path: spec.tls[0].hosts[1]
          value: jenkins-my-release.alt.example.com
  - it: multiple TLS hosts, some with Release.Name template variable
    set:
      controller.secondaryingress:
        enabled: true
        hostName: jenkins-{{ .Release.Name }}.example.com
        ingressClassName: nginx
        paths:
          - /wsagents/
        tls:
          - secretName: my-tls-secret
            hosts:
              - jenkins-hard-coded.example.com
              - jenkins-{{ .Release.Name }}.alt.example.com
    asserts:
      - equal:
          path: spec.tls[0].hosts[0]
          value: jenkins-hard-coded.example.com
      - equal:
          path: spec.tls[0].hosts[1]
          value: jenkins-my-release.alt.example.com
  - it: TLS without secretName uses default secret
    set:
      controller.secondaryingress:
        enabled: true
        hostName: jenkins.example.com
        ingressClassName: nginx
        paths:
          - /github-webhook
        tls:
          - hosts:
              - jenkins.example.com
    asserts:
      - equal:
          path: spec.tls[0].hosts[0]
          value: jenkins.example.com
      - isNull:
          path: spec.tls[0].secretName
  - it: empty TLS entry does not render tls block
    set:
      controller.secondaryingress:
        enabled: true
        hostName: jenkins.example.com
        paths:
          - /github-webhook
        tls:
          - {}
    asserts:
      - isNull:
          path: spec.tls
  - it: annotations with and without template variables
    set:
      controller.secondaryingress:
        enabled: true
        hostName: jenkins.example.com
        paths:
          - /github-webhook
        annotations:
          nginx.ingress.kubernetes.io/app-root: /{{ .Release.Name }}
          nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    asserts:
      - equal:
          path: metadata.annotations
          value:
            nginx.ingress.kubernetes.io/app-root: /my-release
            nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
  - it: ingressClassName with template variable
    set:
      controller.secondaryingress:
        enabled: true
        hostName: jenkins.example.com
        ingressClassName: "{{ .Release.Name }}-nginx"
        paths:
          - /github-webhook
    asserts:
      - equal:
          path: spec.ingressClassName
          value: my-release-nginx
  - it: ingressClassName with hard-coded value
    set:
      controller.secondaryingress:
        enabled: true
        hostName: jenkins.example.com
        ingressClassName: "nginx"
        paths:
          - /github-webhook
    asserts:
      - equal:
          path: spec.ingressClassName
          value: nginx
